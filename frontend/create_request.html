<!DOCTYPE html>
<html>
<head>
    <title>Create Request</title>
</head>
<body>

    <h1>Create Facility Request</h1>

    <form>

        <label>Employee Name</label>
        <br>
        <input type="text" placeholder="Enter your name">

        <br><br>

        <label>Floor</label>
        <br>
        <select>
            <option>Select Floor</option>
            <option>Floor 1</option>
            <option>Floor 2</option>
            <option>Floor 3</option>
        </select>

        <br><br>

        <label>Pantry Location</label>
        <br>
        <select>
            <option>Select Pantry</option>
            <option>Pantry A</option>
            <option>Pantry B</option>
            <option>Pantry C</option>
        </select>

        <br><br>

        <label>Issue Type</label>
        <br>
        <select>
            <option>Select Issue</option>
            <option>Tea/Coffee Refill</option>
            <option>Milk Refill</option>
            <option>Sugar Refill</option>
            <option>Cup Shortage</option>
            <option>Dishwash Liquid Refill</option>
            <option>Cleaning Required</option>
        </select>

        <br><br>

        <label>Description</label>
        <br>
        <textarea rows="4" cols="40" placeholder="Describe the issue"></textarea>

        <br><br>

        <button>Submit Request</button>

    </form>

    <br>
    <a href="index.html">Back to Home</a>
    <script src="javascript/create_request.js"></script>

</body>
</html>
