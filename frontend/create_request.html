<!DOCTYPE html>
<html>
<head>
    <title>Create Request</title>
</head>
<body>

    <h1>Create Facility Request</h1>

    <form id="requestForm">

        <label>Employee Name</label>
        <input type="text" id="employeeName" placeholder="Enter your name">

        <label style="margin-left: 30px;">Employee ID</label>
        <input type="text" id="employeeId" placeholder="Enter your employee ID">

        <br><br>

        <label>Floor</label>
        <br>
        <select id="floor">
            <option value="">Select Floor</option>
            <option>Floor 1</option>
            <option>Floor 2</option>
            <option>Floor 3</option>
        </select>

        <br><br>

        <label>Pantry Location</label>
        <br>
        <select id="pantry">
            <option value="">Select Pantry</option>
            <option>Pantry A</option>
            <option>Pantry B</option>
            <option>Pantry C</option>
        </select>

        <br><br>

        <label>Issue Type</label>
        <br>
        <select id="issueType">
            <option value="">Select Issue</option>
            <option>Tea/Coffee Refill</option>
            <option>Milk Refill</option>
            <option>Sugar Refill</option>
            <option>Cup Shortage</option>
            <option>Dishwash Liquid Refill</option>
            <option>Cleaning Required</option>
        </select>

        <br><br>

        <label>Description</label>
        <br>
        <textarea id="description" rows="4" cols="40" placeholder="Describe the issue"></textarea>

        <br><br>

        <button type="submit">Submit Request</button>

    </form>

    <br>

    <a href="index.html">Back to Home</a>
    <script src="javascript/create_request.js"></script>

</body>
</html>
